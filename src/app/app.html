<mat-toolbar color="primary">
  <span>
    <strong><mat-icon fontIcon="toys" class="main-icon" /> Prodavnica Igračaka </strong><mat-icon fontIcon="toys" class="main-icon" />
  </span>
  <span class="spacer"></span>
  <a routerLink="/" matButton><mat-icon fontIcon="home" />Početna</a>
  <a routerLink="/about" matButton><mat-icon fontIcon="info" />O nama</a>
  @if(service.getActiveUser()){
    <a routerLink="/user" matButton><mat-icon fontIcon="account_circle" />Profil</a>
    <a routerLink="/orders" mat-button><mat-icon fontIcon="shopping_bag" />Porudzbine</a>
    <a routerLink="/cart" mat-button><mat-icon fontIcon="shopping_cart" />Korpa</a>
    <button matButton (click)="doLogout()"><mat-icon fontIcon="logout" />Odjavi se</button>

  }@else {
    <a routerLink="/login" matButton><mat-icon fontIcon="login" />Prijava</a>
    <a routerLink="/signup" matButton><mat-icon fontIcon="login" />Registruj se</a>
  }
</mat-toolbar>
<div class="wrapper">
  <router-outlet />
</div>
