<mat-toolbar color="primary">
  <span>
    <strong><mat-icon fontIcon="school" /> KVA2026</strong>
  </span>
  <span class="spacer"></span>
  <a routerLink="/" matButton><mat-icon fontIcon="home" />Home</a>
  <a routerLink="/about" matButton><mat-icon fontIcon="info" />About</a>
  @if(service.getActiveUser()){
    <a routerLink="/user" matButton><mat-icon fontIcon="account_circle" />Profile</a>
    <a routerLink="/orders" mat-button><mat-icon fontIcon="shopping_bag" />Orders</a>
    <a routerLink="/cart" mat-button><mat-icon fontIcon="shopping_cart" />Cart</a>
    <button matButton (click)="doLogout()"><mat-icon fontIcon="logout" />Logout</button>

  }@else {
    <a routerLink="/login" matButton><mat-icon fontIcon="login" />Login</a>
  }
</mat-toolbar>
<div class="wrapper">
  <router-outlet />
</div>
