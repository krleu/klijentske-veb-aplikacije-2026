@if(toys().length > 0){
<div class="card-wrapper">
    @for(t of toys(); track $index){
    <mat-card class="toy-card" appearance="outlined">
        <img mat-card-image [src]="utils.getImageUrl(t)" [alt]="t.name">
        <mat-card-content class="card-content">
            <mat-card-title>
                <strong>{{t.name}}</strong>
            </mat-card-title>
            <mat-card-subtitle class="cena-boja"><strong>Cena: {{utils.formatCena(t.price)}}</strong></mat-card-subtitle>
        </mat-card-content>
        <mat-card-footer>
            <mat-card-actions class="center">
                <a [routerLink]="`/details/${t.toyId}`" matButton>
                    <mat-icon fontIcon="description"></mat-icon>Detalji
                </a>
                @if(service.getActiveUser()){
                <mat-card-actions>
                    <button matButton (click)="addToCart(t)">
                        <mat-icon fontIcon="shopping_cart" />Kupi odmah
                    </button>
                </mat-card-actions>
                }
            </mat-card-actions>
        </mat-card-footer>
    </mat-card>
    }
</div>
}
@else {
<app-loading />
}
