<mat-card class="login-card">
    <mat-card-header>
        <h1>Registracija</h1>
    </mat-card-header>
    <mat-card-content>
        <div>
            <mat-form-field class="full-width">
                <mat-label>Ime</mat-label>
                <input matInput type="text" [(ngModel)]="user.firstName" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Prezime</mat-label>
                <input matInput type="text" [(ngModel)]="user.lastName" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Email</mat-label>
                <input matInput type="email" id="email" [(ngModel)]="user.email" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Adresa</mat-label>
                <input matInput type="text" [(ngModel)]="user.address" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Telefon</mat-label>
                <input matInput type="text" [(ngModel)]="user.phone" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Lozinka</mat-label>
                <input matInput type="password" id="password" [(ngModel)]="user.password" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Ponoviti lozinku</mat-label>
                <input matInput type="password" [(ngModel)]="repeat" required>
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Omiljena kategorija igračaka</mat-label>
                <mat-select [(ngModel)]="user.favToy" name="toy" required>
                    @for (f of toyF(); track f.typeId) {
                    <mat-option [value]="f.name">{{ f.name }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doSignup()">
            <mat-icon fontIcon="login" />Napravi nalog</button>
        <a routerLink="/login" matButton>
            <mat-icon fontIcon="login" />Prijavi se
        </a>
    </mat-card-actions>
</mat-card>
