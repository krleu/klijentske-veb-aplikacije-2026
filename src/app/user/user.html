<mat-card class="login-card">
    <mat-card-header>
        <h1>User Details</h1>
    </mat-card-header>
    <mat-card-content>
        <div>
            <mat-form-field class="full-width">
                <mat-label>First name</mat-label>
                <input matInput type="text" [(ngModel)]="activeUser!.firstName">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Last name</mat-label>
                <input matInput type="text" [(ngModel)]="activeUser!.lastName">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="activeUser!.email">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Address</mat-label>
                <input matInput type="text" [(ngModel)]="activeUser!.address">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Phone number</mat-label>
                <input matInput type="text" [(ngModel)]="activeUser!.phone">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Favorite toy</mat-label>
                <mat-select [(ngModel)]="activeUser!.favToy">
                    @for (f of favToy(); track f.typeId) {
                    <mat-option [value]="f.name">{{f.name}}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>
    </mat-card-content>
    <!-- <mat-card-actions>
        <button type="button" matButton (click)="doLogin()">
            <mat-icon fontIcon="login" />Submit</button>
    </mat-card-actions> -->
</mat-card>
